# ============================================================================
# L9 FEEDBACK LOOP CONFIGURATION
# ============================================================================
# Storage: .cursor-commands/ops/feedback_loop_config.yaml
#
# Purpose:
#   Machine-readable configuration for the L9 learning feedback loop.
#   Extracted from: improvement-loop.md, meta-audit.md, reasoning-metrics.md
#
# Integration:
#   - violation_tracker.py reads this config
#   - /violation command logs violations per this spec
#   - MCP Memory stores violations with lesson_id references
#
# ============================================================================

---

system: L9 Feedback Loop
version: 1.0.0
created: 2026-01-02
updated: 2026-01-02

# =============================================================================
# IMPROVEMENT LOOP CONFIGURATION
# Source: .cursor-commands/intelligence/improvement-loop.md
# =============================================================================

improvement_loop:
  objective: "Drive iterative optimization by applying lessons from System Reflection and Adaptive Reasoning"
  
  cycle:
    step_1_observe:
      action: "Observe current performance metrics"
      sources:
        - reasoning_metrics
        - violation_counts
        - lesson_effectiveness
    
    step_2_compare:
      action: "Compare against previous success patterns"
      reference: "governance_memory_engine"
      threshold_confidence: 0.85
    
    step_3_apply:
      action: "Apply micro-patches or re-weight reasoning parameters"
      methods:
        - lesson_reinforcement
        - rule_weight_adjustment
        - pattern_deprecation
    
    step_4_validate:
      action: "Validate outcomes via reasoning metrics"
      reference: ".cursor-commands/ops/reasoning-metrics.md"
      success_criteria:
        improvement_rate: ">= 0.10"
        optimization_effectiveness: ">= 0.85"
    
    step_5_document:
      action: "Document all changes in meta-audit"
      reference: ".cursor-commands/intelligence/meta-audit.md"
      format: "improvement_snapshot"

  schedule:
    frequency: "24h"
    output: "improvement_snapshot"
    storage: ".cursor-commands/ops/logs/improvement_snapshots.jsonl"

# =============================================================================
# META AUDIT CONFIGURATION
# Source: .cursor-commands/intelligence/meta-audit.md
# =============================================================================

meta_audit:
  objective: "Maintain historical record of all self-modifications, reasoning adjustments, and detected anomalies"
  
  entry_schema:
    timestamp_utc: "required"
    change_type:
      enum: ["reasoning_tuning", "bug_fix", "improvement", "rollback", "lesson_violation"]
    trigger_source:
      enum: ["adaptive_reasoning", "improvement_loop", "reflection", "user_correction", "violation_command"]
    outcome:
      enum: ["success", "reverted", "neutral", "pending"]
    next_steps: "optional"
    lesson_id: "optional"  # For violation tracking
    violation_count: "optional"

  behavior:
    blocking: false
    immutable: true
    enforcement: "option_c"

  storage:
    primary: ".cursor-commands/ops/logs/meta_audit.jsonl"
    mirror: ".cursor-commands/learning/failures/audit_log.jsonl"

# =============================================================================
# REASONING METRICS CONFIGURATION
# Source: .cursor-commands/ops/reasoning-metrics.md
# =============================================================================

reasoning_metrics:
  objective: "Track cognitive performance, success rates, and correction accuracy across the reasoning engine"
  
  metrics:
    confidence_index:
      range: [0, 100]
      description: "Overall confidence in reasoning output"
      threshold_warning: 70
      threshold_critical: 50
    
    correction_success_rate:
      range: [0.0, 1.0]
      description: "Rate of successful corrections after errors"
      target: ">= 0.90"
    
    adaptive_depth_efficiency:
      range: [0.0, 1.0]
      description: "Efficiency of adaptive reasoning depth"
      target: ">= 0.85"
    
    latency_to_accuracy_ratio:
      description: "Trade-off between response time and accuracy"
      ideal: "minimize while maintaining accuracy >= 0.90"
    
    lesson_violation_rate:
      range: [0.0, 1.0]
      description: "Rate of repeated mistakes despite lessons"
      target: "= 0.0"
      alert_threshold: 0.05

  storage:
    telemetry: ".cursor-commands/ops/logs/reasoning_metrics.jsonl"

# =============================================================================
# VIOLATION TRACKING CONFIGURATION
# =============================================================================

violation_tracking:
  enabled: true
  
  sources:
    lessons_file: ".cursor-commands/learning/failures/repeated-mistakes.md"
    audit_log: ".cursor-commands/learning/failures/audit_log.jsonl"
  
  storage:
    local: ".cursor-commands/learning/failures/violations.jsonl"
    mcp_memory:
      enabled: true
      kind: "lesson_violation"
      scope: "cursor"
  
  detection:
    # Patterns that indicate a potential violation
    triggers:
      - pattern: "may not be fully implemented"
        lesson_id: "lesson-015-investigate-first"
        severity: "critical"
      - pattern: "likely generated"
        lesson_id: "lesson-015-investigate-first"
        severity: "critical"
      - pattern: "probably exists"
        lesson_id: "lesson-015-investigate-first"
        severity: "critical"
      - pattern: "/Users/ib-mac/"
        lesson_id: "lesson-013-use-home-variable"
        severity: "critical"
      - pattern: "docker-compose.yaml"
        lesson_id: "lesson-014-root-docker-compose"
        severity: "critical"
      - pattern: "Library/Application Support/Cursor"
        lesson_id: "lesson-012-dropbox-not-library"
        severity: "ultra-critical"
  
  response:
    on_violation:
      - log_to_audit
      - increment_violation_count
      - emit_mcp_memory_entry
      - update_lesson_effectiveness
    
    escalation:
      threshold: 3  # violations of same lesson
      action: "alert_igor"

# =============================================================================
# MCP MEMORY INTEGRATION
# =============================================================================

mcp_memory:
  base_url: "https://l9.quantumaipartners.com/mcp"
  endpoints:
    save: "/tools/save_memory"
    search: "/tools/search_memory"
  
  lesson_sync:
    enabled: true
    kind: "lesson"
    scope: "cursor"
  
  violation_sync:
    enabled: true
    kind: "lesson_violation"
    scope: "cursor"
    include_context: true

# =============================================================================
# FEEDBACK COLLECTOR INTEGRATION
# =============================================================================

feedback_collector:
  script: ".cursor-commands/ops/scripts/feedback_collector.py"
  
  inputs:
    - violations
    - user_corrections
    - lesson_updates
    - effectiveness_scores
  
  outputs:
    - improvement_recommendations
    - lesson_deprecation_candidates
    - high_violation_alerts

# =============================================================================
# WIRING VERIFICATION
# =============================================================================

wiring:
  required_files:
    - path: ".cursor-commands/learning/failures/repeated-mistakes.md"
      purpose: "Lesson database"
    - path: ".cursor-commands/ops/scripts/violation_tracker.py"
      purpose: "Violation logging"
    - path: ".cursor-commands/commands/violation.md"
      purpose: "Slash command"
    - path: ".cursor-commands/ops/scripts/feedback_collector.py"
      purpose: "Feedback aggregation"
  
  integration_tests:
    - name: "violation_to_mcp"
      trigger: "/violation lesson-001"
      expected: "MCP memory entry created"
    - name: "audit_log_append"
      trigger: "any violation"
      expected: "audit_log.jsonl updated"





