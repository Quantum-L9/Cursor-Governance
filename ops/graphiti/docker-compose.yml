# Graphiti + Neo4j for Cursor agent memory (GlobalCommands ops/graphiti)
# Loopback bind only — access via Tailscale from Mac
# Usage: source graphiti.env && docker compose up -d

services:
  neo4j:
    image: neo4j:5.26-community
    container_name: graphiti-neo4j-cursor
    restart: unless-stopped
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:?set NEO4J_PASSWORD}"
      NEO4J_dbms_default__database: graphiti_cursor
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: "512M"
      NEO4J_server_memory_heap_max__size: "1G"
      NEO4J_server_memory_pagecache_size: "512M"
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    volumes:
      - ./neo4j-data:/data
      - ./neo4j-logs:/logs
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  graphiti-mcp:
    image: zepai/graphiti:latest
    container_name: graphiti-mcp-cursor
    restart: unless-stopped
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:?set NEO4J_PASSWORD}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:?set OPENAI_API_KEY}"
      MODEL_NAME: gpt-4o-mini
      SMALL_MODEL_NAME: gpt-4o-mini
      EMBEDDER_NAME: text-embedding-3-small
      GRAPHITI_TELEMETRY_ENABLED: "false"
      GRAPHITI_MCP_TOKEN: "${GRAPHITI_MCP_TOKEN:?set GRAPHITI_MCP_TOKEN}"
    ports:
      - "127.0.0.1:8100:8000"
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
