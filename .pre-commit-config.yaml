# _archived/_archive/archive[d] dirs are kept reference artifacts (git-tracked,
# NOT gitignored) — they document superseded systems but must never block or be
# reformatted by pre-commit. Excluded globally so no current or future hook
# touches them.
exclude: '(^|/)_?archive(d)?/'

repos:
  - repo: local
    hooks:
      - id: no-hardcoded-paths
        name: No hardcoded /Users or /home paths (governance SSOT path contract)
        entry: bash ops/scripts/validate_governance_no_hardcoded_paths.sh
        language: system
        pass_filenames: false

      - id: symlinks-check
        name: Governance symlink wiring is healthy
        entry: bash ops/scripts/validate_governance_symlinks.sh
        language: system
        pass_filenames: false

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22 # pin matches uv.lock — keep in sync when bumping the ruff dev dep
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
