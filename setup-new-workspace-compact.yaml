# SUITE 6 WORKSPACE SETUP - ULTRA COMPACT
# Total: 23 mandatory files | Duration: ~15 min | Enforcement: 200%

# ═══════════════════════════════════════════════════════════
# PREFLIGHT (4 checks)
# ═══════════════════════════════════════════════════════════
preflight:
  - check: 'test -d "$HOME/Dropbox/Cursor Governance/Cursor Governance Suite 6 (L9)"'
  - check: "python3 --version"
  - check: 'python3 -c "import yaml"'
  - check: "pwd"

# ═══════════════════════════════════════════════════════════
# MANDATORY STARTUP SEQUENCE (23 files - NEVER skip)
# ═══════════════════════════════════════════════════════════
startup:
  # Core Protocol & Governance (3 files)
  core:
    - {file: "profiles/session-startup-protocol.md", id: "PRF-SSP-001", sec: 120}
    - {file: ".cursorrules", location: "workspace_root", sec: 30}
    - {file: ".cursor-commands/templates/.cursorrules", location: "global", sec: 30}
  
  # Reasoning Activation (1 file)
  reasoning:
    - {file: "startup/REASONING_STACK.yaml", id: "REASONING-STACK-001", sec: 30, response: "✅ Reasoning Stack ACTIVATED"}
  
  # Learning Files (12 files - recursive load)
  learning:
    path: ".cursor-commands/learning/"
    method: "recursive"
    count: 12
    sec: 300
    subdirs: ["failures/", "patterns/", "solutions/", "n8n_lessons_learned/", "n8n-configs/"]
    files:
      - credentials-policy.md
      - failures/repeated-mistakes.md
      - n8n-ai-agent-patterns.md
      - n8n-configs/EMAIL_NODE_CONFIGURATION_STANDARD.md
      - n8n-configs/SUPABASE_NODE_CONFIGURATION_GUIDE.md
      - patterns/quick-fixes.md
      - solutions/authentication-fixes.md
      - solutions/json-issues.md
      - n8n_lessons_learned/Recursive_Self_Check_Protocol.md
      - n8n_lessons_learned/Node_Research_Guide.md
      - n8n_lessons_learned/N8N_Execution_Protocol.md
  
  # n8n Start-Up Kit (7 files)
  n8n_kit:
    path: ".cursor-commands/n8n-start-up-kit/"
    count: 7
    sec: 300
    files: ["01_README.md", "02_WORKFLOW_CREATION.md", "03_CONTEXT7_REFERENCE.md", "04_VALIDATION_PROTOCOL.md", "05_SYSTEM_ARCHITECTURE.md", "06_QUICK_START.md", "n8n_api_helper.py"]
  
  # Startup Files (5 files)
  startup_files:
    - {file: "startup/system_capabilities.md", id: "DOC-CAP-001", sec: 180}
    - {file: "startup/probabilistic_governance_activated.md", id: "FND-LG-004", sec: 120}
    - {file: "startup/production_speed_pack.md", id: "DEV-SPD-001", sec: 120}
    - {file: "intelligence/pre-build-question-framework.md", id: "INT-PBQ-001", sec: 120}
    - {file: "intelligence/standards/production-quality-standards.md", id: "INT-STD-001", sec: 120, skip_ok: "if_time_constrained"}
  
  # Reasoning Profiles (3 files)
  reasoning_profiles:
    - {file: "profiles/reasoning_n8n.md", id: "INT-RSN-001", sec: 120}
    - {file: "profiles/reasoning_docs.md", id: "INT-RSN-002", sec: 120}
    - {file: "profiles/reasoning_technical_operations.md", id: "INT-RSN-003", sec: 120}
  
  # Operating Modes (3 files)
  operating_modes:
    - {file: "profiles/ynp_mode.md", id: "CMD-001", sec: 60}
    - {file: "profiles/dev_mode.md", id: "CMD-003", sec: 60}
    - {file: "profiles/orchestrator.md", id: "INT-ORC-001", sec: 30}
  
  # Slash Commands (6 files)
  slash_commands:
    - {file: "commands/reasoning.md", id: "CMD-002", cmd: "/reasoning", sec: 120}
    - {file: "commands/ynp.md", id: "CMD-001", cmd: "/ynp", sec: 60}
    - {file: "commands/forge.md", id: "CMD-004", cmd: "/forge", sec: 60}
    - {file: "commands/consolidate.md", id: "CMD-005", cmd: "/consolidate", sec: 60}
    - {file: "commands/analyze.md", id: "CMD-006", cmd: "/analyze", sec: 60}
    - {file: "commands/evaluate.md", id: "CMD-007", cmd: "/evaluate", sec: 60}
  
  # Supporting Profiles (2 files)
  supporting:
    - {file: "profiles/workflow-governance.md", id: "EXE-WF-001", sec: 60}
    - {file: "profiles/operational-health.md", id: "EXE-OP-001", sec: 60}
  
  # Feature Files (4 files)
  features:
    - {file: "intelligence/meta-learning/meta-learning-log.md", id: "INT-ML-001", sec: 60}
    - {file: "intelligence/reasoning/cursor-native-reasoning.md", id: "INT-RE-001", sec: 120}
    - {file: "foundation/logic/universal-kernel.md", id: "FND-LG-002", sec: 60}
    - {file: "foundation/logic/rule-registry.json", id: "FND-LG-001", sec: 30}

# ═══════════════════════════════════════════════════════════
# INSTALLATION
# ═══════════════════════════════════════════════════════════
installation:
  - {step: "sync_config", cmd: 'python3 "$HOME/Dropbox/Cursor Governance/Cursor Governance Suite 6 (L9)/environment/env-manager.py" sync "$(pwd)"', output: ".suite6-config.json"}
  - {step: "create_symlinks", cmd: 'bash "$HOME/Dropbox/Cursor Governance/Cursor Governance Suite 6 (L9)/ops/scripts/setup_workspace_symlinks.sh"', output: ".cursor-commands symlink"}

# ═══════════════════════════════════════════════════════════
# INTELLIGENCE SYSTEMS
# ═══════════════════════════════════════════════════════════
intelligence:
  learning: {script: "process_learnings.sh", schedule: "hourly", components: ["OPS-AGG-001", "OPS-UPD-001", "OPS-MLS-001", "OPS-SYN-001"]}
  context: {script: "process_context.sh", schedule: "hourly", component: "OPS-CTX-001"}
  activate:
    - 'bash "$HOME/Dropbox/Cursor Governance/GlobalCommands/ops/scripts/process_learnings.sh"'
    - 'bash "$HOME/Dropbox/Cursor Governance/GlobalCommands/ops/scripts/process_context.sh"'

# ═══════════════════════════════════════════════════════════
# PENDING LESSONS (Display inline at startup)
# ═══════════════════════════════════════════════════════════
pending_lessons:
  medium: {file: "learning/failures/lessons_review_log.jsonl", threshold: "0.70-0.85", display: "inline"}
  low: {file: "learning/failures/audit_log.jsonl", threshold: "<0.70", display: "summary"}
  display_script: |
    if [ -f ".cursor-commands/learning/failures/lessons_review_log.jsonl" ]; then
      cat .cursor-commands/learning/failures/lessons_review_log.jsonl | python3 -c "
      import json, sys
      for i, line in enumerate(sys.stdin, 1):
        lesson = json.loads(line)
        print(f'{i}. {lesson[\"lesson_id\"]} (Score: {lesson[\"quality_score\"]})')
        print(f'   Mistake: {lesson[\"lesson_content\"].get(\"mistake\", \"N/A\")}')
        print(f'   Prevention: {lesson[\"lesson_content\"].get(\"prevention\", \"N/A\")}')
      "
    fi

# ═══════════════════════════════════════════════════════════
# VERIFICATION
# ═══════════════════════════════════════════════════════════
verification:
  auto: {script: "ops/scripts/verify-startup-files.sh", exit_on_fail: true}
  manual:
    counts: {learning: 12, n8n_kit: 7, reasoning: 3, modes: 3, commands: 6, supporting: 2, features: 4}
    checks:
      - 'test -f ".suite6-config.json"'
      - 'test -L ".cursor-commands"'
      - 'readlink .cursor-commands | grep -q "Dropbox"'
  launchagents: ["com.tenx.chat-export", "com.tenx.learning-processor", "com.cursor.context.processor"]

# ═══════════════════════════════════════════════════════════
# ENFORCEMENT (200%)
# ═══════════════════════════════════════════════════════════
enforcement:
  level: "200%"
  rules:
    skip_never: {action: "BLOCK_EXECUTION", severity: "CRITICAL"}
    missing_file: {action: "ESCALATE_TO_USER", severity: "CRITICAL"}
    verification_fail: {action: "EXIT_WITH_ERROR", severity: "CRITICAL"}
    wrong_symlink: {action: "BLOCK_EXECUTION", severity: "CRITICAL"}
  
  pre_execution:
    - "Preflight checks passed"
    - "All 23 mandatory files read"
    - "Pending lessons reviewed"
    - "Intelligence systems activated"
    - "Verification passed"
    - "LaunchAgents running"

# ═══════════════════════════════════════════════════════════
# QUICK COMMANDS
# ═══════════════════════════════════════════════════════════
commands:
  setup: 'python3 "$HOME/Dropbox/Cursor Governance/Cursor Governance Suite 6 (L9)/environment/env-manager.py" sync "$(pwd)"'
  symlink: 'bash "$HOME/Dropbox/Cursor Governance/Cursor Governance Suite 6 (L9)/ops/scripts/setup_workspace_symlinks.sh"'
  verify: "bash .cursor-commands/ops/scripts/verify-startup-files.sh"
  activate_learning: 'bash "$HOME/Dropbox/Cursor Governance/GlobalCommands/ops/scripts/process_learnings.sh"'
  activate_context: 'bash "$HOME/Dropbox/Cursor Governance/GlobalCommands/ops/scripts/process_context.sh"'
  check_lessons: 'cat .cursor-commands/learning/failures/lessons_review_log.jsonl | python3 -m json.tool'

# ═══════════════════════════════════════════════════════════
# SUCCESS CRITERIA
# ═══════════════════════════════════════════════════════════
success:
  message: "✅ SESSION INITIALIZED - 200% ENFORCEMENT ACTIVE"
  loaded: "23 files (protocol + governance + learning + n8n + startup + profiles + commands + features)"
  systems: "Intelligence systems activated | LaunchAgents running"
  enforcement: "200% active | All violations blocked"
  
