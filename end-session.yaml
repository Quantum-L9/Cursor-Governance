# SESSION END PROTOCOL v2.1
# Structured handoff for reliable session resume
# Total: 5 phases | Duration: ~1 min

# ═══════════════════════════════════════════════════════════
# TRIGGERS (dual path — automatic + manual)
# ═══════════════════════════════════════════════════════════
triggers:
  sessionEnd:
    type: cursor_hook
    event: sessionEnd
    enabled: true
    fail_open: true
    hook_script: "$GLOBAL_COMMANDS/ops/hooks/session_end_governance_backup.sh"
    hook_link: "$HOME/.cursor/hooks/governance-backup.sh"
    hooks_config: "$HOME/.cursor/hooks.json"
    template: "$GLOBAL_COMMANDS/ops/hooks/hooks.json.template"
    installed_by: "$GLOBAL_COMMANDS/ops/scripts/setup_workspace_symlinks.sh"
    runs: "phase_4_governance_github only"
    commit_message: "chore(governance): session-end sync $(date +%Y-%m-%d)"
    log: "$HOME/.cursor-governance/backup.log"
    verify: "tail -5 $HOME/.cursor-governance/backup.log"

  end_session:
    type: slash_command
    command: "/end-session"
    command_file: "skills/l9-end-session/SKILL.md"
    protocol: "end-session.yaml"
    runs: "all phases (1–5)"
    commit_message: "chore(governance): end-session $(date +%Y-%m-%d)"
    invoke: "Type /end-session in Cursor chat"

  governance_backup_only:
    type: shell
    description: "Manual Phase 4 only — no handoff/memory steps"
    command: |
      bash .cursor-commands/ops/scripts/backup_to_github.sh \
        "chore(governance): manual backup $(date +%Y-%m-%d)"
    aliases:
      - "make governance-backup"

# ═══════════════════════════════════════════════════════════
# EXECUTION SUMMARY
# ═══════════════════════════════════════════════════════════
# Phase 1: PICKUP_CONTEXT - Structured handoff packet (REQUIRED)
# Phase 2: LESSONS - Extract lessons/errors (IF ANY)
# Phase 3: GIT_STATE - Capture uncommitted work (AUTO)
# Phase 4: GOVERNANCE_GITHUB - Push GlobalCommands to Cursor-Governance (REQUIRED)
#   → automatic: sessionEnd hook | manual: /end-session or governance_backup_only
# Phase 5: CONFIRMATION - Display summary (AUTO)

# ═══════════════════════════════════════════════════════════
# PHASE 1: PICKUP CONTEXT (Structured Handoff)
# ═══════════════════════════════════════════════════════════
phase_1_pickup_context:
  name: "Write Structured Pickup Context"
  priority: 1
  required: true
  description: |
    Write structured pickup to memory-bank/activeContext.md (T0 SSOT) and optional Graphiti episode.
    Legacy C1 PICKUP writes are deprecated.
  
  memory_bank_update: |
    Update memory-bank/activeContext.md with: task, files touched, next action, blockers, GMP IDs, outcome.
  
  graphiti_optional: |
    When GRAPHITI_MEMORY_ENABLED=1:
    python3 .cursor-commands/ops/graphiti/graphiti_memory_client.py write \
      --body "PICKUP|date={DATE}|task={TASK}|..." --kind pickup_context
  
  template: |
    PICKUP|date={YYYY-MM-DD}|task={current_task}|files={file1,file2,file3}|next={next_action}|blocker={blocker_or_none}|gmps={GMP-XX,GMP-YY}|outcome={success|partial|blocked}
  
  example: |
    PICKUP|date=2026-01-16|task=WMToGraphSync bidirectional sync|files=api/server.py,core/integration/wm_to_graph_sync.py,runtime/Dockerfile|next=Deploy container detection fix to VPS|blocker=none|gmps=GMP-68|outcome=success
  
  command: |
    python3 agents/cursor/cursor_memory_client.py write \
      "PICKUP|date={DATE}|task={TASK}|files={FILES}|next={NEXT}|blocker={BLOCKER}|gmps={GMPS}|outcome={OUTCOME}" \
      --kind pickup_context
  
  fields:
    date: "YYYY-MM-DD format"
    task: "What was being worked on (single phrase)"
    files: "Top 3-5 files modified (comma-separated)"
    next: "Single most important next action"
    blocker: "What's blocking progress, or 'none'"
    gmps: "GMP IDs completed this session (comma-separated)"
    outcome: "success|partial|blocked"
  
  search_at_resume: |
    # T0 SSOT first
    cat memory-bank/activeContext.md
    # Then Graphiti (when enabled)
    python3 .cursor-commands/ops/graphiti/graphiti_memory_client.py search "PICKUP|" --limit 3

# ═══════════════════════════════════════════════════════════
# PHASE 2: LESSONS & ERRORS (If Any)
# ═══════════════════════════════════════════════════════════
phase_2_lessons:
  name: "Extract Lessons and Errors"
  priority: 2
  required: false
  description: "Only write if significant lessons or errors occurred"
  
  lesson_template: |
    LESSON|topic={topic}|learned={what_was_learned}|context={when_this_applies}
  
  error_template: |
    ERROR|type={error_type}|cause={root_cause}|fix={how_fixed}
  
  commands:
    lesson: |
      python3 agents/cursor/cursor_memory_client.py write \
        "LESSON|topic={TOPIC}|learned={LEARNED}|context={CONTEXT}" \
        --kind lesson
    
    error: |
      python3 agents/cursor/cursor_memory_client.py write \
        "ERROR|type={TYPE}|cause={CAUSE}|fix={FIX}" \
        --kind error
  
  examples:
    lesson: "LESSON|topic=governance|learned=ContextVar must be set via async context manager before handler calls|context=FastAPI routes with RLS"
    error: "ERROR|type=container_detection|cause=/.dockerenv missing in slim images|fix=Use L9_CONTAINER_ENV=true env var"

# ═══════════════════════════════════════════════════════════
# PHASE 3: GIT STATE (Automated)
# ═══════════════════════════════════════════════════════════
phase_3_git_state:
  name: "Capture Git State"
  priority: 3
  required: true
  auto: true
  description: "Automatically capture git state for context"
  
  command: |
    # Run these commands to gather git state:
    BRANCH=$(git branch --show-current)
    COMMIT=$(git log -1 --format="%h %s")
    UNCOMMITTED=$(git status --short | wc -l | tr -d ' ')
    STAGED=$(git diff --cached --name-only | wc -l | tr -d ' ')
    
    # Write to memory if uncommitted changes exist
    if [ "$UNCOMMITTED" -gt 0 ]; then
      python3 agents/cursor/cursor_memory_client.py write \
        "GIT|branch=$BRANCH|commit=$COMMIT|uncommitted=$UNCOMMITTED|staged=$STAGED" \
        --kind git_state
    fi
  
  display: |
    IF uncommitted > 0:
      ⚠️ Uncommitted changes: {count} files
      Branch: {branch}
      Last commit: {commit}
      → Ask: "Commit before closing? [Y/N]"
    ELSE:
      ✅ Working tree clean

# ═══════════════════════════════════════════════════════════
# PHASE 4: GOVERNANCE GITHUB BACKUP
# ═══════════════════════════════════════════════════════════
phase_4_governance_github:
  name: "Backup GlobalCommands to GitHub"
  priority: 4
  required: true
  triggers:
    automatic: triggers.sessionEnd
    manual:
      - triggers.end_session
      - triggers.governance_backup_only
  description: |
    Push SSOT (.cursor-commands / GlobalCommands) to Quantum-L9/Cursor-Governance.
    Runs on sessionEnd hook (automatic) or via /end-session / manual backup command.
  command: |
    bash .cursor-commands/ops/scripts/backup_to_github.sh \
      "chore(governance): end-session $(date +%Y-%m-%d)"
  skip_env: GOVERNANCE_BACKUP_SKIP=1
  log: "$HOME/.cursor-governance/backup.log"
  verify:
    log: "tail -5 $HOME/.cursor-governance/backup.log"
    github: "gh api repos/Quantum-L9/Cursor-Governance/commits --jq '.[0].sha'"
    pass_criteria:
      - "New log lines with today's timestamp (sessionEnd hook fired)"
      - "OK: pushed... or OK: nothing to commit — SSOT matches index"

# ═══════════════════════════════════════════════════════════
# PHASE 5: CONFIRMATION
# ═══════════════════════════════════════════════════════════
phase_5_confirmation:
  name: "Session End Confirmation"
  priority: 5
  required: true
  auto: true
  
  output_template: |
    ╔═══════════════════════════════════════════════════════════╗
    ║           ✅ SESSION CLOSED - HANDOFF COMPLETE           ║
    ╚═══════════════════════════════════════════════════════════╝
    
    📦 PICKUP CONTEXT STORED
    ├─ Task: {task}
    ├─ Files: {files}
    ├─ Next: {next_action}
    ├─ GMPs: {gmps}
    └─ Outcome: {outcome}
    
    📝 LESSONS: {lesson_count} written
    🔧 ERRORS: {error_count} documented
    
    📂 GIT STATE
    ├─ Branch: {branch}
    ├─ Uncommitted: {uncommitted_count} files
    └─ Last commit: {commit}
    
    🎯 NEXT SESSION RESUME:
       python3 agents/cursor/cursor_memory_client.py search "PICKUP|"
    
    👋 Ready to resume anytime.

# ═══════════════════════════════════════════════════════════
# QUICK REFERENCE
# ═══════════════════════════════════════════════════════════
quick_reference:
  triggers:
    automatic: "Close Cursor window → sessionEnd hook → ~/.cursor-governance/backup.log"
    manual_full: "/end-session — all phases + governance backup"
    manual_backup: "bash .cursor-commands/ops/scripts/backup_to_github.sh"
  minimal_end: |
    # Minimum viable session end (30 seconds)
    python3 agents/cursor/cursor_memory_client.py write \
      "PICKUP|date=$(date +%Y-%m-%d)|task=TASK|files=FILES|next=NEXT|blocker=none|gmps=none|outcome=success" \
      --kind pickup_context
  
  resume_search: |
    # At next session start
    python3 agents/cursor/cursor_memory_client.py search "PICKUP|" --limit 3
  
  memory_kinds:
    - pickup_context: "Session handoff (MOST IMPORTANT)"
    - lesson: "What was learned"
    - error: "Errors encountered and fixed"
    - git_state: "Uncommitted work snapshot"

# ═══════════════════════════════════════════════════════════
# ANTI-PATTERNS
# ═══════════════════════════════════════════════════════════
anti_patterns:
  - "❌ DON'T write free-form text (hard to search)"
  - "❌ DON'T skip pickup_context (breaks resume)"
  - "❌ DON'T skip cache_set_session_context (breaks cross-window resume)"
  - "❌ DON'T forget uncommitted changes"
  
  do:
    - "✅ DO use structured PICKUP| format"
    - "✅ DO keep task/next to single phrases"
    - "✅ DO write next_steps into Redis session context and PICKUP packet"
    - "✅ DO run git status before closing"

# ═══════════════════════════════════════════════════════════
# SEARCH PATTERNS FOR RESUME
# ═══════════════════════════════════════════════════════════
resume_searches:
  recent_pickup: "PICKUP|"
  recent_lessons: "LESSON|"
  recent_errors: "ERROR|"
  by_date: "PICKUP|date=2026-01-"
  by_gmp: "gmps=GMP-68"
